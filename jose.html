<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#150A31" />
    <title>José Lastra Ramos | Origiland</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon" />
  </head>
  <body>
    <main
      class="contact-screen persona-jose"
      data-name="José Lastra Ramos"
      data-first-name="José"
      data-last-name="Lastra Ramos"
      data-role="CEO & Co Founder"
      data-phone="5564975134"
      data-work-phone="5564975134"
      data-email="jose@origiland.com.mx"
      data-website="https://origiland.com.mx/"
      data-location="México"
      data-photo="assets/jose.jpg"
    >
      <div
        class="ambient ambient-one js-parallax"
        data-depth="0.04"
        aria-hidden="true"
      ></div>
      <div
        class="ambient ambient-two js-parallax"
        data-depth="0.07"
        aria-hidden="true"
      ></div>
      <div
        class="ambient ambient-three js-parallax"
        data-depth="0.11"
        aria-hidden="true"
      ></div>
      <div class="grid-noise" aria-hidden="true"></div>

      <section
        class="digital-card"
        aria-label="Tarjeta digital de José Lastra Ramos"
      >
        <header class="topbar reveal" style="--delay: 60ms">
          <a
            class="close-link js-ripple"
            href="https://origiland.com.mx/"
            aria-label="Cerrar tarjeta"
          >
            <span></span><span></span>
          </a>
          <a
            class="mini-brand"
            href="https://origiland.com.mx/"
            target="_blank"
            rel="noreferrer"
            aria-label="Ir al sitio de Origiland"
          >
            <span class="origin-mark tiny" aria-hidden="true"></span>
            <span>Origiland</span>
          </a>
          <span class="top-pill">Real Estate Intelligence</span>
        </header>

        <section class="profile hero reveal" style="--delay: 140ms">
          <div class="avatar-wrap js-tilt">
            <span class="avatar-orbit" aria-hidden="true"></span>
            <img
              src="assets/jose.jpg"
              alt="Foto de José Lastra Ramos"
              class="avatar"
            />
          </div>
          <p class="eyebrow">Origiland Team</p>
          <h1>José Lastra Ramos</h1>
          <p class="role">CEO & Co Founder</p>
        </section>

        <section
          class="brand-quote reveal"
          style="--delay: 220ms"
          aria-label="Frase de marca"
        >
          <p>Donde otros ven tierra, nosotros vemos posibilidades.</p>
        </section>

        <section class="contact-list" aria-label="Datos de contacto">
          <button
            class="info-card reveal js-copy js-tilt"
            style="--delay: 280ms"
            data-copy="José Lastra Ramos"
            data-toast="Nombre copiado"
            type="button"
          >
            <span class="info-icon" aria-hidden="true">✦</span>
            <span class="info-content"
              ><strong>José Lastra Ramos</strong><small>Nombre</small></span
            >
          </button>

          <button
            class="info-card reveal js-copy js-tilt"
            style="--delay: 340ms"
            data-copy="5564975134"
            data-toast="Teléfono copiado"
            type="button"
          >
            <span class="info-icon" aria-hidden="true">☎</span>
            <span class="info-content"
              ><strong>5564975134</strong
              ><small>Teléfono · Celular</small></span
            >
          </button>

          <button
            class="info-card reveal js-copy js-tilt"
            style="--delay: 400ms"
            data-copy="5564975134"
            data-toast="Teléfono copiado"
            type="button"
          >
            <span class="info-icon" aria-hidden="true">⌁</span>
            <span class="info-content"
              ><strong>5564975134</strong
              ><small>Teléfono · Trabajo</small></span
            >
          </button>

          <button
            class="info-card reveal js-copy js-tilt"
            style="--delay: 460ms"
            data-copy="jose@origiland.com.mx"
            data-toast="Correo copiado"
            type="button"
          >
            <span class="info-icon" aria-hidden="true">@</span>
            <span class="info-content"
              ><strong>jose@origiland.com.mx</strong
              ><small>Correo electrónico · Trabajo</small></span
            >
          </button>

          <a
            class="info-card reveal js-tilt"
            style="--delay: 520ms"
            href="https://origiland.com.mx/"
            target="_blank"
            rel="noreferrer"
          >
            <span class="info-icon" aria-hidden="true">↗</span>
            <span class="info-content"
              ><strong>origiland.com.mx</strong><small>Sitio web</small></span
            >
          </a>

          <button
            class="info-card reveal js-copy js-tilt"
            style="--delay: 580ms"
            data-copy="México"
            data-toast="Ubicación copiada"
            type="button"
          >
            <span class="info-icon" aria-hidden="true">⌖</span>
            <span class="info-content"
              ><strong>México</strong><small>Ubicación</small></span
            >
          </button>
        </section>

        <section
          class="actions reveal"
          style="--delay: 640ms"
          aria-label="Acciones principales"
        >
          <button
            class="action primary js-save-vcard js-ripple"
            type="button"
            aria-label="Guardar contacto de José Lastra Ramos"
          >
            <span>Guardar contacto</span>
          </button>
          <a
            class="action js-whatsapp js-ripple"
            href="#"
            target="_blank"
            rel="noreferrer"
            aria-label="Enviar WhatsApp a José Lastra Ramos"
            >WhatsApp</a
          >
          <a
            class="action js-mail js-ripple"
            href="mailto:jose@origiland.com.mx"
            aria-label="Enviar correo a José Lastra Ramos"
            >Email</a
          >
          <a
            class="action js-website js-ripple"
            href="https://origiland.com.mx/"
            target="_blank"
            rel="noreferrer"
            aria-label="Abrir sitio web de Origiland"
            >Sitio web</a
          >
        </section>

        <footer class="card-footer reveal" style="--delay: 720ms">
          <span class="origin-mark footer-mark" aria-hidden="true"></span>
          <div>
            <strong>Origiland</strong>
            <small>Análisis. Estrategia. Oportunidad.</small>
          </div>
          <a class="switch-link" href="beatriz.html">Ver contacto de Beatriz</a>
        </footer>
      </section>

      <div class="toast" role="status" aria-live="polite"></div>
    </main>
  </body>
</html>
