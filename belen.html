<!doctype html>
<html lang="es">

  <meta name="theme-color" content="#150A31" />
  <title>Belén Cabrera Galicia | Origiland</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
  <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
</head>
<body>
  <main
    class="contact-screen persona-belen"
    data-name="Belén Cabrera Galicia"
    data-first-name="Belén"
    data-last-name="Cabrera Galicia"
    data-role="Real Estate Advisor"
    data-phone="5525788377"
    data-work-phone="5525788377"
    data-email="belen@origiland.com.mx"
    data-website="https://origiland.com.mx/"
    data-location="México"
    data-photo="assets/belen.jpg"
  >
    <div class="ambient ambient-one js-parallax" data-depth="0.04" aria-hidden="true"></div>
    <div class="ambient ambient-two js-parallax" data-depth="0.07" aria-hidden="true"></div>
    <div class="ambient ambient-three js-parallax" data-depth="0.11" aria-hidden="true"></div>
    <div class="grid-noise" aria-hidden="true"></div>

    <section class="digital-card" aria-label="Tarjeta digital de Belén Cabrera Galicia">

        <a class="close-link js-ripple" href="https://origiland.com.mx/" aria-label="Cerrar tarjeta">
          <span></span><span></span>
        </a>
        <a class="mini-brand" href="https://origiland.com.mx/" target="_blank" rel="noreferrer" aria-label="Ir al sitio de Origiland">
          <span class="origin-mark tiny" aria-hidden="true"></span>
          <span>Origiland</span>
        </a>
        <span class="top-pill">Real Estate Intelligence</span>
      </header>

      <section class="profile hero reveal" style="--delay: 140ms">
        <div class="avatar-wrap js-tilt">
          <span class="avatar-orbit" aria-hidden="true"></span>
          <img src="assets/belen.jpg" alt="Foto de Belén Cabrera Galicia" class="avatar" />
        </div>
        <p class="eyebrow">Origiland Team</p>
        <h1>Belén Cabrera Galicia</h1>
        <p class="role">Real Estate Advisor</p>
      </section>

      <section class="brand-quote reveal" style="--delay: 220ms" aria-label="Frase de marca">
        <p>Convertimos la tierra en oportunidades.</p>
      </section>

      <section class="contact-list" aria-label="Datos de contacto">
        <button class="info-card reveal js-copy js-tilt" style="--delay: 280ms" data-copy="Belén Cabrera Galicia" data-toast="Nombre copiado" type="button">
          <span class="info-icon" aria-hidden="true">✦</span>
          <span class="info-content"><strong>Belén Cabrera Galicia</strong><small>Nombre</small></span>
        </button>

        <button class="info-card reveal js-copy js-tilt" style="--delay: 340ms" data-copy="552-578-8377" data-toast="Teléfono copiado" type="button">
          <span class="info-icon" aria-hidden="true">☎</span>
          <span class="info-content"><strong>552-578-8377</strong><small>Teléfono · Celular</small></span>
        </button>

        <button class="info-card reveal js-copy js-tilt" style="--delay: 400ms" data-copy="552-578-8377" data-toast="Teléfono copiado" type="button">
          <span class="info-icon" aria-hidden="true">⌁</span>
          <span class="info-content"><strong>552-578-8377</strong><small>Teléfono · Trabajo</small></span>
        </button>

        <button class="info-card reveal js-copy js-tilt" style="--delay: 460ms" data-copy="belen@origiland.com.mx" data-toast="Correo copiado" type="button">
          <span class="info-icon" aria-hidden="true">@</span>
          <span class="info-content"><strong>belen@origiland.com.mx</strong><small>Correo electrónico · Trabajo</small></span>
        </button>

        <a class="info-card reveal js-tilt" style="--delay: 520ms" href="https://origiland.com.mx/" target="_blank" rel="noreferrer">
          <span class="info-icon" aria-hidden="true">↗</span>
          <span class="info-content"><strong>origiland.com.mx</strong><small>Sitio web</small></span>
        </a>

        <button class="info-card reveal js-copy js-tilt" style="--delay: 580ms" data-copy="México" data-toast="Ubicación copiada" type="button">
          <span class="info-icon" aria-hidden="true">⌖</span>
          <span class="info-content"><strong>México</strong><small>Ubicación</small></span>
        </button>
      </section>

      <section class="actions reveal" style="--delay: 640ms" aria-label="Acciones principales">
        <button class="action primary js-save-vcard js-ripple" type="button" aria-label="Guardar contacto de Belén Cabrera Galicia">
          <span>Guardar contacto</span>
        </button>
        <a class="action js-whatsapp js-ripple" href="#" target="_blank" rel="noreferrer" aria-label="Enviar WhatsApp a Belén Cabrera Galicia">WhatsApp</a>
        <a class="action js-mail js-ripple" href="mailto:belen@origiland.com.mx" aria-label="Enviar correo a Belén Cabrera Galicia">Email</a>
        <a class="action js-website js-ripple" href="https://origiland.com.mx/" target="_blank" rel="noreferrer" aria-label="Abrir sitio web de Origiland">Sitio web</a>
      </section>

      <footer class="card-footer reveal" style="--delay: 720ms">
        <span class="origin-mark footer-mark" aria-hidden="true"></span>
        <div>
          <strong>Origiland</strong>
          <small>Análisis. Estrategia. Oportunidad.</small>
        </div>
        <a class="switch-link" href="amairani.html">Ver contacto de Amairani</a>
      </footer>

    <div class="toast" role="status" aria-live="polite"></div>
